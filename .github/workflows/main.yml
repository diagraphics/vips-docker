name: publish
on: [push]
jobs:
  publish-image:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image (poppler)
        uses: docker/build-push-action@v4
        with:
          context: .
          target: final
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/diagraphics/vips:latest
          provenance: false

      - name: Build and push image (pdfium)
        uses: docker/build-push-action@v4
        with:
          context: .
          target: pdfium-final
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/diagraphics/vips:pdfium-latest
          provenance: false